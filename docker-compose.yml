services:
  hudba-cms:
    build: .
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/hudba-cms.db
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
    volumes:
      - hudba_data:/data
    restart: unless-stopped
    command: sh -c "node node_modules/.bin/payload migrate && node server.js"

volumes:
  hudba_data: