services:
  hudba-cms:
    build: .
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/hudba-cms.db
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?PAYLOAD_SECRET is required}
    volumes:
      - hudba_data:/data
    restart: unless-stopped

volumes:
  hudba_data:
